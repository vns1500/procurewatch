services:
  postgres:
    image: ankane/pgvector:latest
    environment:
      POSTGRES_USER: procure
      POSTGRES_PASSWORD: procure
      POSTGRES_DB: procurewatch
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U procure -d procurewatch"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://procure:procure@postgres:5432/procurewatch
      REDIS_URL: redis://redis:6379
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app/backend
    command: >
      sh -c "uvicorn backend.api.main:app --host 0.0.0.0 --port 8000 --reload"

  api-seed:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://procure:procure@postgres:5432/procurewatch
      REDIS_URL: redis://redis:6379
    env_file:
      - .env
    depends_on:
      api:
        condition: service_started
    restart: "no"
    command: >
      sh -c "sleep 10 && python -c \"
      import asyncio, httpx
      async def seed():
          async with httpx.AsyncClient(base_url='http://api:8000', timeout=120) as c:
              r = await c.post('/tenders/seed')
              print(r.json())
      asyncio.run(seed())
      \""

  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://procure:procure@postgres:5432/procurewatch
      REDIS_URL: redis://redis:6379
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app/backend
    command: celery -A backend.tasks.celery_app.celery worker --loglevel=info --concurrency=2

  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://procure:procure@postgres:5432/procurewatch
      REDIS_URL: redis://redis:6379
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app/backend
    command: celery -A backend.tasks.celery_app.celery beat --loglevel=info

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - api
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next

volumes:
  pgdata:
